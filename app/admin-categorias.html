<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Categorías</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">

<h2>🍽 Restaurant Service</h2>

<a href="admin.html">🏠 Dashboard</a>
<a href="admin-productos.html">🍽 Productos</a>
<a href="admin-categorias.html">📂 Categorías</a>
<a href="#">⚙ Variantes</a>
<a href="#">➕ Modificadores</a>
<a href="#">👥 Usuarios</a>
<a href="#">🏢 Configuración</a>

</div>

<div class="content">

<h1>Categorías</h1>

<table width="100%" border="1">

<thead>

<tr>

<th>ID</th>

<th>Nombre</th>

<th>Destino</th>

</tr>

</thead>

<tbody id="tabla">

</tbody>

</table>

</div>

<script>

fetch("http://localhost:3000/admin/categorias")

.then(r=>r.json())

.then(datos=>{

datos.forEach(c=>{

tabla.innerHTML+=`

<tr>

<td>${c.id}</td>

<td>${c.nombre}</td>

<td>${c.destino}</td>

</tr>

`;

});

});

</script>

</body>

</html>
