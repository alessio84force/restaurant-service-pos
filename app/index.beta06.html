<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Restaurant Service POS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Restaurant Service POS</h1>
  <p>La gestión completa de tu restaurante</p>
</header>

<main>
  <section class="mesas">
    <h2>Mesas</h2>
    <div class="grid-mesas"></div>
  </section>

  <section class="pedido">
    <h2>Pedido seleccionado</h2>
    <div id="detalle-pedido">
      Selecciona una mesa para ver el pedido.
    </div>
  </section>

  <section class="productos">
    <h2>Productos</h2>
    <div id="lista-productos">
      Selecciona una mesa para añadir productos.
    </div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
