<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Restaurant Service POS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Restaurant Service POS</h1>
    <p>La gestión completa de tu restaurante</p>
  </header>

  <main>
    <section class="panel">
      <h2>Panel principal</h2>

      <div class="menu">
        <button>Mesas</button>
        <button>Pedidos</button>
        <button>Cocina</button>
        <button>Bar</button>
        <button>Productos</button>
        <button>Precuenta</button>
      </div>
    </section>

    <section class="mesas">
      <h2>Mesas</h2>
      <div class="grid-mesas"></div>
    </section>

    <section class="pedido">
      <h2>Pedido seleccionado</h2>
      <div id="detalle-pedido">
        Selecciona una mesa para ver el pedido.
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
